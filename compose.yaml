services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: rss
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/rss
      RUST_LOG: info
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3001
      FRONTEND_URL: http://localhost:3001
      API_URL: http://localhost:3000
      JWT_SECRET: change_me_in_dev
      APP_NAME: rss
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      MAIL_FROM: noreply@rss.local
      SMTP_FROM_NAME: rss
      ASSETS_PATH: /data/assets
    depends_on:
      - postgres
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - ../kaleido:/kaleido:ro
      - rss_assets:/data/assets

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile.dev
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/rss
      RUST_LOG: info
      APP_NAME: rss
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      MAIL_FROM: noreply@rss.local
      SMTP_FROM_NAME: rss
      OLLAMA_URL: http://ollama:11434
      ASSETS_PATH: /data/assets
    depends_on:
      - postgres
      - ollama
    volumes:
      - .:/app
      - ../kaleido:/kaleido:ro
      - rss_assets:/data/assets

  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    # Pull the model on first start; subsequent starts skip if already cached
    entrypoint: ['/bin/sh', '-c', 'ollama serve & sleep 5 && ollama pull qwen2.5:3b && wait']

  ui-next:
    build:
      context: ./ui-next
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_CDN_URL: http://localhost:3000/uploads
    depends_on:
      - api
    ports:
      - '3001:3000'
    volumes:
      - ./ui-next:/app
      - ../kaleido:/app/kaleido:ro
      - ui_next_node_modules:/app/node_modules

  # fake-feeds:
  #   image: nginx:alpine
  #   volumes:
  #     - ./fake-feeds:/usr/share/nginx/html:ro
  #   ports:
  #     - '8099:80'

volumes:
  postgres_data:
  ui_next_node_modules:
  ollama_data:
  rss_assets:
