version: "3"

vars:
  PROJECT_NAME: "rss"

tasks:
  ui:deps:
    dir: ui
    deps: [ui:npm-install]
    status:
      - test -f ui/package.json

  ui:npm-install:
    dir: ui
    cmds:
      - pnpm install
    status:
      - test -f ui/package.json

  ui:dev:
    dir: ui
    deps: [ui:deps]
    cmds:
      - pnpm run dev
    status:
      - test -f ui/package.json

  ui-next:deps:
    dir: ui-next
    cmds:
      - pnpm install
    status:
      - test -f ui-next/package.json

  ui-next:dev:
    dir: ui-next
    deps: [ui-next:deps]
    cmds:
      - pnpm run dev
    status:
      - test -f ui-next/package.json

  api:dev:
    cmds:
      - cargo run --bin api

  api:build:
    cmds:
      - cargo build --release --bin api

  worker:dev:
    cmds:
      - cargo run --bin worker

  migration:up:
    dir: migration
    cmds:
      - cargo run -- up

  test:
    cmds:
      - cargo test

  test:worker:
    cmds:
      - cargo test --test worker

  test:worker:integration:
      - cargo test -p worker -- --ignored

  openapi:react-query:
    desc: Generate OpenAPI TypeScript definitions from running API
    vars:
      OPENAPI_TMP: .openapi-tmp.json
    cmds:
      - echo "Waiting for API to be ready..."
      - |
        OPENAPI_URL="${OPENAPI_URL:-http://localhost:3000/openapi.json}"
        OPENAPI_TMP="{{.OPENAPI_TMP}}"
        for i in {1..30}; do
          status=$(curl -s -o "$OPENAPI_TMP" -w "%{http_code}" "$OPENAPI_URL" || echo "000")
          if [ "$status" = "200" ]; then
            if node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('$OPENAPI_TMP','utf8')); if(!j.openapi) process.exit(2);" >/dev/null 2>&1; then
              break
            fi
          fi
          sleep 2
        done
      - npx openapi-typescript {{.OPENAPI_TMP}} --output ui-next/lib/react-query/api.d.ts
      - rm -f {{.OPENAPI_TMP}}
