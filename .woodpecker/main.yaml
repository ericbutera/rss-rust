when:
  - event: push
    branch: main
  - event: manual

steps:
  # Clone kaleido alongside the workspace so cargo uses the local [patch] path
  # in Cargo.toml rather than fetching from GitHub during the build.
  - name: clone-kaleido
    image: alpine/git
    commands:
      - sh .woodpecker/clone-kaleido.sh

  # Rust unit tests (uses local kaleido path, no network calls from cargo)
  - name: test-rust
    image: rust:1-bookworm
    depends_on: [clone-kaleido]
    environment:
      TEST_MODE: "1"
    commands:
      - sh .woodpecker/test-rust.sh

  # TypeScript type-check for ui-next (runs in parallel with Rust tests)
  - name: test-ui
    image: node:25-alpine
    commands:
      - sh .woodpecker/test-ui.sh

  # Builds are serialized (api → worker → ui) to avoid concurrent Kaniko
  # processes exhausting server RAM. Kaniko --cache keeps rebuilds fast.
  - name: build-api
    image: woodpeckerci/plugin-kaniko
    depends_on: [test-rust, test-ui]
    settings:
      registry: registry.registry:5000
      repo: rss-api
      tags: ${CI_COMMIT_SHA},latest
      insecure: true
      skip_tls_verify: true
      insecure-pull: true
      insecure-registry: true
      context: .
      dockerfile: api/Dockerfile
      cache: true
      cache_repo: rss-api-cache

  - name: build-worker
    image: woodpeckerci/plugin-kaniko
    depends_on: [build-api]
    settings:
      registry: registry.registry:5000
      repo: rss-worker
      tags: ${CI_COMMIT_SHA},latest
      insecure: true
      skip_tls_verify: true
      insecure-pull: true
      insecure-registry: true
      context: .
      dockerfile: worker/Dockerfile
      cache: true
      cache_repo: rss-worker-cache

  - name: create-ui-env
    image: alpine:latest
    depends_on: [build-worker]
    commands:
      - sh ui-next/create-env.sh

  - name: build-ui
    image: woodpeckerci/plugin-kaniko
    depends_on: [create-ui-env]
    settings:
      registry: registry.registry:5000
      repo: rss-ui
      tags: ${CI_COMMIT_SHA},latest
      insecure: true
      skip_tls_verify: true
      insecure-pull: true
      insecure-registry: true
      context: ui-next
      dockerfile: ui-next/Dockerfile

  # Runs after all builds complete. Sets all three tags and runs ONE pulumi up
  # to avoid 409 "Another update is currently in progress" errors.
  - name: deploy
    image: pulumi/pulumi-go:latest
    depends_on: [build-api, build-worker, build-ui]
    environment:
      PULUMI_ACCESS_TOKEN:
        from_secret: PULUMI_ACCESS_TOKEN
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
      PULUMI_IAC_REPO:
        from_secret: PULUMI_IAC_REPO
    commands:
      - sh .woodpecker/deploy.sh
