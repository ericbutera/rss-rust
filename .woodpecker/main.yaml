when:
  - event: push
    branch: main
  - event: manual

# Path sets (referenced in each step's when clause):
#   rust: api/**, worker/**, migration/**, Cargo.{toml,lock},
#         .woodpecker/{clone-kaleido,test-rust}.sh
#   ui:   ui-next/**, .woodpecker/test-ui.sh

steps:
  # Clone kaleido then run Rust unit tests.
  # Merged into one step so there is no cross-step depends_on that breaks
  # when the step is absent from the pipeline due to path filtering.
  - name: test-rust
    image: rust:1-bookworm
    when:
      - event: push
        branch: main
        path:
          include:
            - "api/**"
            - "worker/**"
            - "migration/**"
            - "Cargo.*"
            - ".woodpecker/**"
      - event: manual
    environment:
      TEST_MODE: "1"
    commands:
      - sh .woodpecker/clone-kaleido.sh
      - sh .woodpecker/test-rust.sh

  # TypeScript type-check for ui-next (runs in parallel with Rust tests)
  - name: test-ui
    image: node:25-alpine
    when:
      - event: push
        branch: main
        path:
          include:
            - "ui-next/**"
            - ".woodpecker/**"
      - event: manual
    commands:
      - sh .woodpecker/test-ui.sh

  # Builds are serialized (api → worker → ui) to avoid concurrent Kaniko
  # processes exhausting server RAM. Kaniko --cache keeps rebuilds fast.
  - name: build-api
    image: woodpeckerci/plugin-kaniko
    depends_on: [test-rust, test-ui]
    when:
      - event: push
        branch: main
        path:
          include:
            - "api/**"
            - "worker/**"
            - "migration/**"
            - "Cargo.*"
      - event: manual
    settings:
      registry: registry.container-registry:5000
      repo: rss-api
      tags: ${CI_COMMIT_SHA},latest
      insecure: true
      skip_tls_verify: true
      insecure-pull: true
      insecure-registry: true
      context: .
      dockerfile: api/Dockerfile
      cache: true
      cache_repo: rss-api-cache

  - name: build-worker
    image: woodpeckerci/plugin-kaniko
    depends_on: [build-api]
    when:
      - event: push
        branch: main
        path:
          include:
            - "api/**"
            - "worker/**"
            - "migration/**"
            - "Cargo.*"
      - event: manual
    settings:
      registry: registry.container-registry:5000
      repo: rss-worker
      tags: ${CI_COMMIT_SHA},latest
      insecure: true
      skip_tls_verify: true
      insecure-pull: true
      insecure-registry: true
      context: .
      dockerfile: worker/Dockerfile
      cache: true
      cache_repo: rss-worker-cache

  - name: create-ui-env
    image: alpine:latest
    depends_on: [build-worker]
    when:
      - event: push
        branch: main
        path:
          include:
            - "ui-next/**"
            - ".woodpecker/**"
      - event: manual
    commands:
      - sh ui-next/create-env.sh

  - name: build-ui
    image: woodpeckerci/plugin-kaniko
    depends_on: [create-ui-env]
    when:
      - event: push
        branch: main
        path:
          include:
            - "ui-next/**"
            - ".woodpecker/**"
      - event: manual
    settings:
      registry: registry.container-registry:5000
      repo: rss-ui
      tags: ${CI_COMMIT_SHA},latest
      insecure: true
      skip_tls_verify: true
      insecure-pull: true
      insecure-registry: true
      context: ui-next
      dockerfile: ui-next/Dockerfile

  # Runs after all builds complete. Sets all three tags and runs ONE pulumi up
  # to avoid 409 "Another update is currently in progress" errors.
  - name: deploy
    image: pulumi/pulumi-go:latest
    depends_on: [build-api, build-worker, build-ui]
    when:
      - event: push
        branch: main
        path:
          include:
            - "api/**"
            - "worker/**"
            - "migration/**"
            - "Cargo.*"
            - "ui-next/**"
      - event: manual
    environment:
      PULUMI_ACCESS_TOKEN:
        from_secret: PULUMI_ACCESS_TOKEN
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
      PULUMI_IAC_REPO:
        from_secret: PULUMI_IAC_REPO
    commands:
      - sh .woodpecker/deploy.sh
