when:
  - event: push
    branch: main
  - event: manual

steps:
  # No path conditions on any step — Woodpecker excludes path-conditional steps
  # from the DAG entirely, which breaks depends_on chains. Kaniko's --cache
  # makes rebuilds of unchanged services fast.
  # build-api and build-worker start immediately (no deps).
  # create-ui-env runs in parallel with them; build-ui waits on it.
  - name: create-ui-env
    image: alpine:latest
    commands:
      - sh ui-next/create-env.sh

  - name: build-api
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: registry.container-registry:5000
      repo: rss-api
      tags: ${CI_COMMIT_SHA},latest
      insecure: true
      skip_tls_verify: true
      insecure-pull: true
      insecure-registry: true
      context: .
      dockerfile: api/Dockerfile
      cache: true
      cache_repo: rss-api-cache

  - name: build-worker
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: registry.container-registry:5000
      repo: rss-worker
      tags: ${CI_COMMIT_SHA},latest
      insecure: true
      skip_tls_verify: true
      insecure-pull: true
      insecure-registry: true
      context: .
      dockerfile: worker/Dockerfile
      cache: true
      cache_repo: rss-worker-cache

  - name: build-ui
    image: woodpeckerci/plugin-kaniko
    depends_on: [create-ui-env]
    settings:
      registry: registry.container-registry:5000
      repo: rss-ui
      tags: ${CI_COMMIT_SHA},latest
      insecure: true
      skip_tls_verify: true
      insecure-pull: true
      insecure-registry: true
      context: ui-next
      dockerfile: ui-next/Dockerfile

  # Runs after all builds complete. Sets all three tags and runs ONE pulumi up
  # to avoid 409 "Another update is currently in progress" errors.
  - name: deploy
    image: pulumi/pulumi-go:latest
    depends_on: [build-api, build-worker, build-ui]
    environment:
      PULUMI_ACCESS_TOKEN:
        from_secret: PULUMI_ACCESS_TOKEN
      GITHUB_TOKEN:
        from_secret: GITHUB_TOKEN
      PULUMI_IAC_REPO:
        from_secret: PULUMI_IAC_REPO
    commands:
      - |
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
        MANUAL="${CI_PIPELINE_EVENT}"
        API_TAG=""
        WORKER_TAG=""
        UI_TAG=""

        if [ "$MANUAL" = "manual" ] || echo "$CHANGED" | grep -qE "^(api/|migration/|Cargo\.toml|Cargo\.lock|\.woodpecker/)"; then
          API_TAG="${CI_COMMIT_SHA}"
        fi
        if [ "$MANUAL" = "manual" ] || echo "$CHANGED" | grep -qE "^(api/|worker/|migration/|Cargo\.toml|Cargo\.lock|\.woodpecker/)"; then
          WORKER_TAG="${CI_COMMIT_SHA}"
        fi
        if [ "$MANUAL" = "manual" ] || echo "$CHANGED" | grep -qE "^(ui-next/|\.woodpecker/)"; then
          UI_TAG="${CI_COMMIT_SHA}"
        fi

        if [ -z "$API_TAG" ] && [ -z "$WORKER_TAG" ] && [ -z "$UI_TAG" ]; then
          echo "No deployable changes detected, skipping deploy"
          exit 0
        fi

        git clone https://x-access-token:$GITHUB_TOKEN@github.com/$PULUMI_IAC_REPO /tmp/pulumi-iac
        cd /tmp/pulumi-iac/rss
        pulumi stack select ericbutera/rss/rss --non-interactive

        if [ -n "$API_TAG" ]; then pulumi config set rss:apiTag "$API_TAG"; fi
        if [ -n "$WORKER_TAG" ]; then pulumi config set rss:workerTag "$WORKER_TAG"; fi
        if [ -n "$UI_TAG" ]; then pulumi config set rss:uiTag "$UI_TAG"; fi

        pulumi up --yes --skip-preview
